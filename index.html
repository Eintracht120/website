<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matthew Viney</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      max-width: 520px;
      padding: 2rem;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      margin: 0 auto 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 600;
      color: #fff;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 0.5rem;
    }

    .tagline {
      color: #888;
      font-size: 1rem;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .links a {
      display: block;
      padding: 0.85rem 1.5rem;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      color: #e0e0e0;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: background 0.2s, border-color 0.2s;
    }

    .links a:hover {
      background: #1a1a1a;
      border-color: #444;
    }

    .socials {
      display: flex;
      justify-content: center;
      gap: 1.25rem;
      margin-top: 2rem;
    }

    .socials a {
      color: #666;
      transition: color 0.2s;
    }

    .socials a:hover {
      color: #fff;
    }

    .socials svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="avatar">MV</div>
    <h1>Matthew Viney</h1>
    <p class="tagline">Welcome to my corner of the internet.</p>
